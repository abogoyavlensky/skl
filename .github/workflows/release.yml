name: release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  checks:
    uses: ./.github/workflows/checks.yml

  release:
    needs: [checks]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v3

      - name: Read lg version from .mise.toml
        run: |
          set -euo pipefail
          version="$(awk -F= '
            /^\[tools\]/ { in_tools = 1; next }
            /^\[/        { in_tools = 0 }
            in_tools && $1 ~ /^[[:space:]]*lg[[:space:]]*$/ {
              gsub(/[" ]/, "", $2); print $2; exit
            }
          ' .mise.toml)"
          if [ -z "$version" ]; then
            echo "could not read lg version from .mise.toml" >&2
            exit 1
          fi
          echo "LG_VERSION=$version" >> "$GITHUB_ENV"
          echo "Resolved lg version from .mise.toml: $version"

      - name: Build bundles for all targets
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          base_url="https://github.com/nooga/let-go/releases/download/v${LG_VERSION}"
          mkdir -p dist bases build
          curl -sSL -o lg-checksums.txt "$base_url/checksums.txt"

          for target in linux_amd64 linux_arm64 darwin_amd64 darwin_arm64; do
            echo "::group::Building $target"
            tarball="let-go_${LG_VERSION}_${target}.tar.gz"
            curl -sSL -o "$tarball" "$base_url/$tarball"
            grep " $tarball\$" lg-checksums.txt | sha256sum -c -

            mkdir -p "bases/$target" "build/$target"
            tar -xzf "$tarball" -C "bases/$target"
            rm -f "$tarball"

            lgx build -bundle-base "bases/$target/lg"
            mv bin/skl "build/$target/skl"

            archive="skl_${version}_${target}.tar.gz"
            tar -czf "dist/$archive" -C "build/$target" skl
            echo "built dist/$archive"
            echo "::endgroup::"
          done

          echo "Smoke testing native binary..."
          ./build/linux_amd64/skl --version

          (cd dist && sha256sum *.tar.gz > checksums.txt)
          ls -la dist/

      - name: Publish GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
              --repo="$GITHUB_REPOSITORY" \
              --title="${TAG}" \
              --generate-notes \
              dist/*

  homebrew:
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" -p checksums.txt -O checksums.txt
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/abogoyavlensky/homebrew-tap.git" tap
          mkdir -p tap/Formula
          bash scripts/generate-formula.sh "$version" checksums.txt > tap/Formula/skl.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/skl.rb
          git diff --cached --quiet && { echo "formula unchanged"; exit 0; }
          git commit -m "skl ${version}"
          git push
